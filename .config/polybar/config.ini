[colors]
background = #1a1b26

background-alt = #373B41
foreground = #c0caf5
primary = #9ece6a
secondary = #e0af68
alert = #a9b1d6
disabled = #565f89

[bar/bar]
width = 100%
height = 20pt
background = ${colors.background}
foreground = ${colors.foreground}

line-size = 3pt

;border-size = 4pt
border-color = #00000000

padding-left = 0
padding-right = 3

module-margin = 2


font-0 = cherry:size=14;3
font-1 = Wuncon Siji:size=20;3
modules-left =  battery
modules-right = filesystem pulseaudio 
modules-center = date mpd
cursor-click = pointer
cursor-scroll = ns-resize

enable-ipc = true

[bar/bar2]
width = 25%
height = 20pt
background = ${colors.background}
foreground = ${colors.foreground}

line-size = 3pt

;border-size = 4pt
border-color = #00000000
padding-left = 0
padding-right = 3

module-margin = 2

bottom = true
right = true

font-0 = cherry:size=14;3
font-1 = Wuncon Siji:size=20;3
modules-left = xworkspaces xwindow
cursor-click = pointer
cursor-scroll = ns-resize

enable-ipc = true

separator = |
separator-foreground = ${colors.disabled}

[bar/bar3]
width = 25%
height = 20pt
background = ${colors.background}
foreground = ${colors.foreground}
offset-x = 75%
line-size = 3pt

;border-size = 4pt
border-color = #00000000
padding-left = 0
padding-right = 3

module-margin = 2

bottom = true
right = true

font-0 = cherry:size=14;3
font-1 = Wuncon Siji:size=20;3
modules-right = wlan eth
cursor-click = pointer
cursor-scroll = ns-resize

enable-ipc = true

separator = |
separator-foreground = ${colors.disabled}


[module/mpd]
type = internal/mpd
host = 127.0.0.1
port = 6600

interval = 2

format-online = <label-song> <icon-play> <icon-pause>
icon-play = Óāö
icon-pause = ÓĀô

[module/battery]
full-at = 98
low-at = 10

battery = BAT0
adapter = ADP1

poll-interval = 5

time-format = %H:%M

format-charging = <label-charging>
format-discharging = <label-discharging>

label-charging = Charging %percentage%%
label-discharging = Discharging %percentage%%

[module/xworkspaces]
type = internal/xworkspaces

label-active = %name%
label-active-background = ${colors.background-alt}
label-active-underline= ${colors.primary}
label-active-padding = 1

label-occupied = %name%
label-occupied-padding = 1

label-urgent = %name%
label-urgent-background = ${colors.alert}
label-urgent-padding = 1

label-empty = %name%
label-empty-foreground = ${colors.disabled}
label-empty-padding = 1

[module/xwindow]
type = internal/xwindow
label = %title:0:40:...%

[module/filesystem]
type = internal/fs
interval = 25

mount-0 = /

label-mounted = %{F#F0C674}Óáė%{F-} %percentage_used%%

label-unmounted = %mountpoint% not mounted
label-unmounted-foreground = ${colors.disabled}

[module/pulseaudio]
type = internal/pulseaudio

format-volume-prefix = "ÓąÉ "
format-volume-prefix-foreground = ${colors.primary}
format-volume = <label-volume> <bar-volume>

bar-volumne-format = %fill%%indicator%%empty%
bar-volume-width = 10

bar-volume-gradient = true 
bar-volume-indicator = |
bar-volume-fill = -
bar-volume-empty = -

label-volume = %percentage%%

label-muted = muted
label-muted-foreground = ${colors.disabled}

[module/xkeyboard]
type = internal/xkeyboard
blacklist-0 = num lock

label-layout = %layout%
label-layout-foreground = ${colors.primary}

label-indicator-padding = 2
label-indicator-margin = 1
label-indicator-foreground = ${colors.background}
label-indicator-background = ${colors.secondary}

[network-base]
type = internal/network
interval = 5
format-connected = <label-connected>
format-disconnected = <label-disconnected>
label-disconnected = %{F#F0C674}%ifname%%{F#707880} disconnected

[module/wlan]
inherit = network-base
interface-type = wireless
label-connected = %{F#F0C674}%ifname%%{F-} %essid% %local_ip%

[module/eth]
inherit = network-base
interface-type = wired
label-connected = %{F#F0C674}%ifname%%{F-} %local_ip%

[module/date]
type = internal/date
interval = 1

date = %Y-%m-%d %H:%M

label = %date%
label-foreground = ${colors.primary}

[settings]
screenchange-reload = true
pseudo-transparency = true

; vim:ft=dosini
